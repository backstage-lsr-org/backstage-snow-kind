kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: backstage-snow-poc

nodes:
  - role: control-plane
    # Map host port 7007 → node port 30007 so localhost:7007 works without ingress
    extraPortMappings:
      - containerPort: 30007
        hostPort: 7007
        protocol: TCP
      - containerPort: 30181
        hostPort: 8181
        protocol: TCP
