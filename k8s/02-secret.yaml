apiVersion: v1
kind: Secret
metadata:
  name: backstage-snow-secrets
  namespace: backstage-snow
type: Opaque
stringData:
  # Default: mock password (admin:admin in base64)
  SERVICENOW_PASSWORD: "admin"
  SERVICENOW_AUTH_B64: "YWRtaW46YWRtaW4="   # base64(admin:admin)
  # ── Real SNow: replace the values above ──────────────────────────────────────
  # SERVICENOW_PASSWORD: "your-real-password"
  # SERVICENOW_AUTH_B64: "<base64 of user:password>"
  # Generate: echo -n 'user:pass' | base64
