apiVersion: apps/v1
kind: Deployment
metadata:
  name: backstage-snow-poc
  namespace: backstage-snow
  labels:
    app: backstage-snow-poc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backstage-snow-poc
  template:
    metadata:
      labels:
        app: backstage-snow-poc
      annotations:
        # Force pod rollout when config changes
        configmap-version: "v1"
    spec:
      containers:
        - name: backstage-snow-poc
          # ── Change this to your DockerHub image ───────────────────────────
          image: ${DOCKERHUB_USERNAME}/backstage-snow-poc:latest
          # image: your-org/backstage-snow-poc:v1.0.0
          imagePullPolicy: Always

          ports:
            - name: backstage
              containerPort: 7007
            - name: snow-mock
              containerPort: 8181

          envFrom:
            - configMapRef:
                name: backstage-snow-config
            - secretRef:
                name: backstage-snow-secrets

          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"

          readinessProbe:
            httpGet:
              path: /api/catalog/entities
              port: 7007
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6

          livenessProbe:
            httpGet:
              path: /api/catalog/entities
              port: 7007
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3

          volumeMounts:
            - name: sqlite-data
              mountPath: /tmp/backstage-db

      volumes:
        - name: sqlite-data
          emptyDir: {}

---
# ── Service: Backstage UI + API (NodePort → host:7007) ───────────────────────
apiVersion: v1
kind: Service
metadata:
  name: backstage
  namespace: backstage-snow
spec:
  type: NodePort
  selector:
    app: backstage-snow-poc
  ports:
    - name: web
      protocol: TCP
      port: 7007
      targetPort: 7007
      nodePort: 30007

---
# ── Service: ServiceNow mock (NodePort → host:8181) ───────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: servicenow-mock
  namespace: backstage-snow
spec:
  type: NodePort
  selector:
    app: backstage-snow-poc
  ports:
    - name: mock
      protocol: TCP
      port: 8181
      targetPort: 8181
      nodePort: 30181
